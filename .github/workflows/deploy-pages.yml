# Build the sample app for every released SDK version and deploy to GitHub Pages.
# - Versions are derived from git tags matching MAJOR.MINOR.PATCH (e.g. 6.1.0).
# - The highest semver tag is mirrored at the site root as "latest".
# - Each tag is also published under /<version>/{simple,react}/.
# - Tag push or workflow_dispatch: build + deploy.
# - PR (same-repo only): build all versions to validate (no deploy).
# - Pushes to main do NOT deploy — cut a tag to publish.
#
# Allowlist for NGC on PRs: Repo Settings → Variables → ALLOWED_NGC_PR_AUTHORS
# (comma-separated GitHub logins, e.g. "alice,bob"). Empty = no one gets NGC on PRs.
# Optional: Repo variable PAGES_ARTIFACT_RETENTION_DAYS (days until artifact expires; default 3).
# Required: Repo Settings → Pages → Source = "GitHub Actions".

name: Deploy samples to GitHub Pages

on:
  push:
    tags: ['[0-9]+.[0-9]+.[0-9]+']
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: 'pages'
  cancel-in-progress: false

jobs:
  # Allowlist: run build for same-repo PRs only; use_ngc_key = true for tag/dispatch or allowlisted PR author.
  check:
    runs-on: ubuntu-latest
    permissions: {}
    outputs:
      run_build: ${{ steps.allowlist.outputs.run }}
      use_ngc_key: ${{ steps.allowlist.outputs.use_ngc_key }}
    steps:
      - id: allowlist
        env:
          ALLOWED: ${{ vars.ALLOWED_NGC_PR_AUTHORS }}
        run: |
          if [ "${{ github.event_name }}" != 'pull_request' ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
            echo "use_ngc_key=true" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event.pull_request.head.repo.full_name }}" != "${{ github.repository }}" ]; then
            echo "run=false" >> "$GITHUB_OUTPUT"
            echo "use_ngc_key=false" >> "$GITHUB_OUTPUT"
          else
            echo "run=true" >> "$GITHUB_OUTPUT"
            ACTOR="${{ github.actor }}"
            case ",${ALLOWED}," in
              *",${ACTOR},"*) echo "use_ngc_key=true" >> "$GITHUB_OUTPUT" ;;
              *) echo "use_ngc_key=false" >> "$GITHUB_OUTPUT" ;;
            esac
          fi

  build:
    needs: check
    if: needs.check.outputs.run_build == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Enumerate semver tags
        id: versions
        run: |
          TAGS=$(git tag -l | grep -E '^[0-9]+\.[0-9]+\.[0-9]+$' | sort -V)
          if [ -z "$TAGS" ]; then
            echo "No semver tags found — nothing to build."
            exit 1
          fi
          LATEST=$(echo "$TAGS" | tail -n1)
          echo "latest=$LATEST" >> "$GITHUB_OUTPUT"
          {
            echo "tags<<EOF"
            echo "$TAGS"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
          echo "Versions to build:"
          echo "$TAGS"
          echo "Latest: $LATEST"

      # Download each tag's SDK tarball from NGC, build simple+react, stage under deploy/<tag>/.
      # The highest semver tag is also copied to deploy/{simple,react}/ as the root "latest".
      - name: Build all versions
        env:
          NGC_API_KEY: ${{ needs.check.outputs.use_ngc_key == 'true' && secrets.NGC_API_KEY }}
          TAGS: ${{ steps.versions.outputs.tags }}
          LATEST: ${{ steps.versions.outputs.latest }}
        run: |
          set -euo pipefail
          mkdir -p deploy
          BASE="https://api.ngc.nvidia.com/v2"

          while IFS= read -r TAG; do
            [ -z "$TAG" ] && continue
            echo "::group::Build $TAG"

            WORKDIR="${RUNNER_TEMP}/build-${TAG}"
            git worktree add --force "$WORKDIR" "$TAG"

            SDK_FILE="nvidia-cloudxr-${TAG}.tgz"
            if [ -z "${NGC_API_KEY:-}" ]; then
              URL="${BASE}/resources/nvidia/cloudxr-js/versions/${TAG}/files/${SDK_FILE}?download=true"
              curl -fL -o "${WORKDIR}/${SDK_FILE}" "$URL"
            else
              URL="${BASE}/org/0566138804516934/team/cloudxr-dev/resources/cloudxr-js/versions/${TAG}/files/${SDK_FILE}"
              curl -fL -o "${WORKDIR}/${SDK_FILE}" \
                -H "Authorization: Bearer $NGC_API_KEY" \
                -H "Content-Type: application/json" \
                "$URL"
            fi

            (cd "${WORKDIR}/simple" && npm install "../${SDK_FILE}" && npm run build)
            (cd "${WORKDIR}/react"  && npm install "../${SDK_FILE}" && npm run build)

            mkdir -p "deploy/${TAG}/simple" "deploy/${TAG}/react"
            cp -r "${WORKDIR}/simple/build/." "deploy/${TAG}/simple/"
            cp -r "${WORKDIR}/react/build/."  "deploy/${TAG}/react/"

            if [ "$TAG" = "$LATEST" ]; then
              mkdir -p deploy/simple deploy/react
              cp -r "${WORKDIR}/simple/build/." deploy/simple/
              cp -r "${WORKDIR}/react/build/."  deploy/react/
            fi

            git worktree remove "$WORKDIR" --force
            echo "::endgroup::"
          done <<< "$TAGS"

      - name: Generate root index.html
        env:
          TAGS: ${{ steps.versions.outputs.tags }}
          LATEST: ${{ steps.versions.outputs.latest }}
        run: |
          set -euo pipefail
          {
            cat <<'HTML_HEAD'
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>NVIDIA CloudXR.js Samples</title>
            <style>
              :root {
                --primary-green: #76b900;
                --border-color: #e0e0e0;
                --text-main: #111;
                --text-muted: #666;
                --background-main: #fff;
              }
              * { box-sizing: border-box; }
              html, body {
                margin: 0;
                padding: 0;
                font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
                background: var(--background-main);
                color: var(--text-main);
                -webkit-font-smoothing: antialiased;
                line-height: 1.5;
              }
              .top-banner {
                width: 100%;
                height: 8px;
                background: var(--primary-green);
              }
              header {
                background: var(--background-main);
                padding: 16px 24px;
                border-bottom: 1px solid var(--border-color);
              }
              header h1 {
                margin: 0;
                font-size: 1.5rem;
                font-weight: 600;
              }
              main {
                max-width: 760px;
                margin: 0 auto;
                padding: 32px 24px 48px;
              }
              h2 {
                font-size: 1.15rem;
                font-weight: 700;
                margin: 32px 0 12px;
              }
              h2:first-of-type { margin-top: 0; }
              .latest-badge {
                display: inline-block;
                background: var(--primary-green);
                color: #fff;
                font-size: 0.75rem;
                font-weight: 700;
                padding: 2px 8px;
                border-radius: 2px;
                margin-left: 8px;
                vertical-align: middle;
                letter-spacing: 0.5px;
              }
              .version-list {
                list-style: none;
                padding: 0;
                margin: 0;
                border-top: 1px solid var(--border-color);
              }
              .version-list li {
                padding: 14px 4px;
                border-bottom: 1px solid var(--border-color);
                display: flex;
                align-items: center;
                flex-wrap: wrap;
                gap: 12px;
              }
              .version-name {
                font-weight: 600;
                min-width: 80px;
              }
              .sample-links { margin-left: auto; display: flex; gap: 16px; }
              .sample-links a {
                color: var(--primary-green);
                text-decoration: none;
                font-weight: 600;
              }
              .sample-links a:hover { text-decoration: underline; }
              .muted { color: var(--text-muted); font-size: 0.9rem; }
              @media (max-width: 540px) {
                .sample-links { margin-left: 0; width: 100%; }
              }
            </style>
          </head>
          <body>
            <div class="top-banner"></div>
            <header>
              <h1>NVIDIA CloudXR.js Samples</h1>
            </header>
            <main>
              <h2>Latest <span class="latest-badge">__LATEST__</span></h2>
              <ul class="version-list">
                <li>
                  <span class="version-name">__LATEST__</span>
                  <span class="muted">Released SDK</span>
                  <span class="sample-links">
                    <a href="./simple/index.html">Simple</a>
                    <a href="./react/index.html">React</a>
                  </span>
                </li>
              </ul>
              <h2>All versions</h2>
              <ul class="version-list">
          HTML_HEAD

            echo "$TAGS" | sort -Vr | while IFS= read -r T; do
              [ -z "$T" ] && continue
              BADGE=""
              if [ "$T" = "$LATEST" ]; then
                BADGE='<span class="muted">latest</span>'
              fi
              cat <<HTML_ROW
                <li>
                  <span class="version-name">${T}</span>
                  ${BADGE}
                  <span class="sample-links">
                    <a href="./${T}/simple/index.html">Simple</a>
                    <a href="./${T}/react/index.html">React</a>
                  </span>
                </li>
          HTML_ROW
            done

            cat <<'HTML_TAIL'
              </ul>
            </main>
          </body>
          </html>
          HTML_TAIL
          } | sed "s/__LATEST__/${LATEST}/g" > deploy/index.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: deploy
          retention-days: ${{ vars.PAGES_ARTIFACT_RETENTION_DAYS || 3 }}

  deploy:
    needs: build
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
